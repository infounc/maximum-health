<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#1A261D"/>
  <rect x="0" y="0" width="800" height="450" fill="url(#grad)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2E22;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A261D;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(107,143,113,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>
  <!-- Decorative circle -->
  <circle cx="400" cy="200" r="60" fill="none" stroke="rgba(107,143,113,0.15)" stroke-width="1.5"/>
  <circle cx="400" cy="200" r="40" fill="none" stroke="rgba(107,143,113,0.1)" stroke-width="1"/>
  <!-- Leaf icon -->
  <g transform="translate(380, 180)" fill="rgba(107,143,113,0.3)">
    <path d="M20 0 C20 0 40 15 40 30 C40 45 25 40 20 40 C15 40 0 45 0 30 C0 15 20 0 20 0 Z"/>
    <line x1="20" y1="12" x2="20" y2="38" stroke="rgba(107,143,113,0.2)" stroke-width="1.5"/>
    <line x1="20" y1="20" x2="12" y2="28" stroke="rgba(107,143,113,0.15)" stroke-width="1"/>
    <line x1="20" y1="25" x2="28" y2="33" stroke="rgba(107,143,113,0.15)" stroke-width="1"/>
  </g>
  <!-- Text -->
  <text x="400" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="rgba(107,143,113,0.35)" letter-spacing="3">MAXIMUM HEALTH</text>
  <text x="400" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(107,143,113,0.2)" letter-spacing="1">BLOG</text>
</svg>
